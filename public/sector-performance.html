<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sector Performance - PSX Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-950 p-4 text-white">
  <div class="mx-auto max-w-5xl">
    <div class="mb-5 flex items-center justify-between">
      <h1 class="text-2xl font-bold text-cyan-300">📊 Sector Performance - PSX Watch</h1>
      <a
        href="/"
        class="rounded-lg border border-gray-600 bg-gray-900 px-3 py-1 text-sm text-gray-200 hover:bg-gray-800"
      >
        Back to Dashboard
      </a>
    </div>

    <div class="mb-4 flex items-center justify-between text-sm text-gray-400">
      <p id="updated">Fetching data...</p>
      <button
        id="refresh-btn"
        type="button"
        class="rounded-lg border border-cyan-700 bg-cyan-900/40 px-3 py-1 text-cyan-200 hover:bg-cyan-800/50"
      >
        Refresh
      </button>
    </div>

    <div id="sector-performance" class="space-y-3"></div>
  </div>

  <script>
    function renderSectorPerformance(stocks) {
      const container = document.getElementById('sector-performance');
      if (!stocks.length) {
        container.innerHTML = '<p class="text-sm text-gray-500">No sector data available.</p>';
        return;
      }

      const sectorMap = new Map();
      stocks.forEach((stock) => {
        const sector = stock.sector || 'Unknown';
        const pct = Number.parseFloat(stock.changePercent);
        if (!Number.isFinite(pct)) return;
        if (!sectorMap.has(sector)) sectorMap.set(sector, { sum: 0, count: 0 });
        const agg = sectorMap.get(sector);
        agg.sum += pct;
        agg.count += 1;
      });

      const sectorRows = [...sectorMap.entries()]
        .map(([name, agg]) => ({ name, avg: agg.count ? agg.sum / agg.count : 0, count: agg.count }))
        .sort((a, b) => b.avg - a.avg);

      const maxAbs = Math.max(1, ...sectorRows.map((s) => Math.abs(s.avg)));
      container.innerHTML = sectorRows.map((sector) => {
        const positive = sector.avg >= 0;
        const width = Math.max(2, (Math.abs(sector.avg) / maxAbs) * 100);
        return `
          <div class="rounded-xl border border-gray-800 bg-gray-900 p-3">
            <div class="mb-1 flex items-center justify-between text-sm">
              <span class="truncate pr-3 text-gray-200">${sector.name}</span>
              <span class="${positive ? 'text-green-400' : 'text-red-400'} font-semibold">${sector.avg.toFixed(2)}%</span>
            </div>
            <div class="mb-1 h-2 w-full rounded bg-gray-800">
              <div class="h-2 rounded ${positive ? 'bg-green-500' : 'bg-red-500'}" style="width:${width}%"></div>
            </div>
            <p class="text-xs text-gray-500">${sector.count} stocks</p>
          </div>
        `;
      }).join('');
    }

    async function loadSectorPerformance() {
      try {
        const res = await fetch('/api/stocks');
        const json = await res.json();
        renderSectorPerformance(json.data || []);
        document.getElementById('updated').textContent = `Updated: ${json.updated || '--'}`;
      } catch (error) {
        document.getElementById('updated').textContent = 'Failed to fetch sector data';
      }
    }

    document.getElementById('refresh-btn').addEventListener('click', loadSectorPerformance);
    loadSectorPerformance();
  </script>
</body>
</html>
